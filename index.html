<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Captions</title>
    <meta name="description" content="Instantly generate engaging Instagram captions with AI.">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-red-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white shadow-xl rounded-lg p-8 max-w-lg w-full text-center">
        <h1 class="text-4xl font-bold text-red-700 mb-4">AI Captions</h1>
        <p class="text-lg text-gray-700 mb-6">Generate captivating Instagram captions with Artificial Intelligence.</p>
        <form id="caption-form" class="space-y-4">
            <input type="text" id="keywords" placeholder="Keywords (e.g., sunset, beach, vacation)" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-red-400">
            <textarea id="description" placeholder="Short description of your post" rows="3" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-red-400"></textarea>
            <select id="tone" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-red-400">
                <option value="">Select Tone</option>
                <option value="humorous">Humorous</option>
                <option value="professional">Professional</option>
                <option value="inspiring">Inspiring</option>
                <option value="casual">Casual</option>
            </select>
            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition duration-300">Generate Caption</button>
        </form>
        <div id="caption-output" class="mt-6 p-4 bg-red-100 border border-red-200 rounded text-gray-800 text-left hidden">
            <p class="font-semibold">Your AI-Generated Caption:</p>
            <p id="generated-text" class="mt-2"></p>
        </div>
        <p class="mt-8 text-sm text-gray-500">Get unlimited captions for just $9.99!</p>
        <button onclick="location.href='#'" class="mt-2 bg-red-400 hover:bg-red-500 text-white font-semibold py-2 px-4 rounded transition duration-300">Buy Now</button>
    </div>
    <script>
        document.getElementById('caption-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('generated-text').textContent = 'Generating...';
            document.getElementById('caption-output').classList.remove('hidden');

            // This is a placeholder for actual AI generation. In a real app, this would call an API.
            const keywords = document.getElementById('keywords').value;
            const description = document.getElementById('description').value;
            const tone = document.getElementById('tone').value;
            const sampleCaptions = [
                `Feeling ${keywords || 'great'}! Here's to good times. ${description || ''} #AIgen #Captions`,
                `A moment to remember. ${description || 'Beautiful day!'} In a ${tone || 'positive'} mood. #InstaGood`
            ];
            
            setTimeout(() => {
                document.getElementById('generated-text').textContent = sampleCaptions[Math.floor(Math.random() * sampleCaptions.length)];
            }, 1500);
        });
    </script>
</body>
</html>
